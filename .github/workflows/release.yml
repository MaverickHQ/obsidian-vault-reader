name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: npm run verify:release

      - name: Verify tag matches manifest version
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} must match manifest version ${VERSION}" >&2
            exit 1
          fi

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          body: |
            Vault Reader release ${{ github.ref_name }}.

            This release is built from the public repository tag, verified by the release workflow, and published with GitHub artifact attestations for the installable assets.

            See docs/release-notes.md for the full changelog.
          files: |
            release/${{ github.ref_name }}/main.js
            release/${{ github.ref_name }}/manifest.json
            release/${{ github.ref_name }}/styles.css

      - name: Attest main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/${{ github.ref_name }}/main.js

      - name: Attest manifest.json
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/${{ github.ref_name }}/manifest.json

      - name: Attest styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/${{ github.ref_name }}/styles.css
